description: FOCUS-aligned FinOps stub for Workday Payroll. Payroll is sold as a Workday tenant module priced per supported country / employee population; per-API-call pricing and a public usage API are not exposed, so meters describe contractual entitlement rather than runtime billing.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public pricing or billing API exists. Generic api_request and compute_seconds meters from the scaffold have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Payroll SaaS
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Payroll
  ServiceCategory: Payroll SaaS
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: payroll_module_subscription
    description: Annual Workday Payroll module entitlement attached to the tenant subscription, scoped by supported country.
    unit: month
    aggregation: max
    dimensions:
      - tenant
      - country
  - name: paid_workforce
    description: Count of paid employees serviced by Workday Payroll; sized at contract time and used to scale the module fee at renewal rather than billed as runtime overage.
    unit: employee
    aggregation: max
    dimensions:
      - tenant
      - country
principles:
  - name: Visibility
    description: Track Workday Payroll spend at the country / module level using signed order forms and Workday-provided pay-run telemetry; reconcile employee counts with the HCM tenant to validate licensed population.
  - name: Allocation
    description: Allocate the Payroll module fee to the global payroll function and chargeback to country payroll teams based on serviced headcount; treat Payroll Connect partner fees as a separate line item from the Workday subscription.
  - name: Optimization
    description: Right-size country footprint at renewal, retire unused legal entities, and consolidate redundant payroll partners or country-specific outsourced providers where Workday Payroll covers the geography natively.
  - name: Accountability
    description: A global payroll lead inside HR / Finance owns the Workday Payroll renewal, reviews country coverage with Workday Customer Success annually, and approves additions or removals of supported countries.
maintainers:
