specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Payroll
providerId: workday-payroll
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payroll
  - HCM
  - Rate Limiting
description: Workday Payroll APIs run inside the parent Workday tenant and inherit tenant-level transactional, integration concurrency, and Studio runtime limits. Workday does not publish numeric rate limits on its public marketing site; specifics live in Workday Community / Customer Center documentation behind authentication.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public per-second or per-minute limits documented. Scaffold tier numbers have been removed.
responseCodes: {}
limits:
  - name: Tenant-Inherited Throughput
    scope: tenant
    metric: varies
    limit: governed by the parent Workday tenant; not publicly documented
    notes: Payroll web services share the tenant's API capacity envelope; per-tenant transactional and concurrency limits apply.
policies:
  - name: Tenant Inheritance
    description: Payroll APIs share the underlying Workday tenant's API quotas; throttling, retries, and integration backoff follow tenant policies.
  - name: Payroll Run Windows
    description: Pay calculations are run during scheduled payroll cycles; integration scheduling around those cycles is a customer-managed concern within the tenant's overall integration concurrency envelope.
  - name: Customer Center Documentation
    description: Numeric thresholds for payroll integrations and Studio jobs are published to authenticated Workday customers in Workday Community.
maintainers:
