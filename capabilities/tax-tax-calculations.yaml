naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll Workday Tax API — Tax Calculations
  description: 'Workday Payroll Workday Tax API — Tax Calculations. 2 operations. Lead operation: Workday Payroll List Tax
    Results for a Pay Run. Self-contained Naftiko capability covering one Workday Payroll business surface.'
  tags:
  - Workday Payroll
  - Tax Calculations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_API_KEY: WORKDAY_PAYROLL_API_KEY
capability:
  consumes:
  - type: http
    namespace: tax-tax-calculations
    baseUri: https://api.workday.com/tax/v1
    description: Workday Payroll Workday Tax API — Tax Calculations business capability. Self-contained, no shared references.
    resources:
    - name: payRuns-payRunId-taxResults
      path: /payRuns/{payRunId}/taxResults
      operations:
      - name: listpayruntaxresults
        method: GET
        description: Workday Payroll List Tax Results for a Pay Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workers-workerId-taxSummary
      path: /workers/{workerId}/taxSummary
      operations:
      - name: getworkertaxsummary
        method: GET
        description: Workday Payroll Get Worker Tax Summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taxYear
          in: query
          type: integer
          description: Tax year (defaults to current year)
    authentication:
      type: bearer
      token: '{{env.WORKDAY_PAYROLL_API_KEY}}'
  exposes:
  - type: rest
    namespace: tax-tax-calculations-rest
    port: 8080
    description: REST adapter for Workday Payroll Workday Tax API — Tax Calculations. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/payruns/{payrunid}/taxresults
      name: payruns-payrunid-taxresults
      description: REST surface for payRuns-payRunId-taxResults.
      operations:
      - method: GET
        name: listpayruntaxresults
        description: Workday Payroll List Tax Results for a Pay Run
        call: tax-tax-calculations.listpayruntaxresults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workers/{workerid}/taxsummary
      name: workers-workerid-taxsummary
      description: REST surface for workers-workerId-taxSummary.
      operations:
      - method: GET
        name: getworkertaxsummary
        description: Workday Payroll Get Worker Tax Summary
        call: tax-tax-calculations.getworkertaxsummary
        with:
          taxYear: rest.taxYear
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tax-tax-calculations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Payroll Workday Tax API — Tax Calculations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-payroll-list-tax-results
      description: Workday Payroll List Tax Results for a Pay Run
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tax-tax-calculations.listpayruntaxresults
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-payroll-get-worker-tax
      description: Workday Payroll Get Worker Tax Summary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tax-tax-calculations.getworkertaxsummary
      with:
        taxYear: tools.taxYear
      outputParameters:
      - type: object
        mapping: $.
