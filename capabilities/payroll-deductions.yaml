naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll API — Deductions
  description: 'Workday Payroll API — Deductions. 2 operations. Lead operation: Workday Payroll List Deduction Codes. Self-contained
    Naftiko capability covering one Workday Payroll business surface.'
  tags:
  - Workday Payroll
  - Deductions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_API_KEY: WORKDAY_PAYROLL_API_KEY
capability:
  consumes:
  - type: http
    namespace: payroll-deductions
    baseUri: https://api.workday.com/payroll/v1
    description: Workday Payroll API — Deductions business capability. Self-contained, no shared references.
    resources:
    - name: deductionCodes
      path: /deductionCodes
      operations:
      - name: listdeductioncodes
        method: GET
        description: Workday Payroll List Deduction Codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workers-workerId-deductions
      path: /workers/{workerId}/deductions
      operations:
      - name: listworkerdeductions
        method: GET
        description: Workday Payroll List Worker Deductions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_PAYROLL_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-deductions-rest
    port: 8080
    description: REST adapter for Workday Payroll API — Deductions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/deductioncodes
      name: deductioncodes
      description: REST surface for deductionCodes.
      operations:
      - method: GET
        name: listdeductioncodes
        description: Workday Payroll List Deduction Codes
        call: payroll-deductions.listdeductioncodes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workers/{workerid}/deductions
      name: workers-workerid-deductions
      description: REST surface for workers-workerId-deductions.
      operations:
      - method: GET
        name: listworkerdeductions
        description: Workday Payroll List Worker Deductions
        call: payroll-deductions.listworkerdeductions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payroll-deductions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Payroll API — Deductions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: workday-payroll-list-deduction-codes
      description: Workday Payroll List Deduction Codes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-deductions.listdeductioncodes
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-payroll-list-worker-deductions
      description: Workday Payroll List Worker Deductions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-deductions.listworkerdeductions
      outputParameters:
      - type: object
        mapping: $.
