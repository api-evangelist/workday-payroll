naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll Results API — Payslips
  description: 'Workday Payroll Results API — Payslips. 2 operations. Lead operation: Workday Payroll List Worker Payslips.
    Self-contained Naftiko capability covering one Workday Payroll business surface.'
  tags:
  - Workday Payroll
  - Payslips
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_API_KEY: WORKDAY_PAYROLL_API_KEY
capability:
  consumes:
  - type: http
    namespace: payroll-results-payslips
    baseUri: https://api.workday.com/payroll-results/v1
    description: Workday Payroll Results API — Payslips business capability. Self-contained, no shared references.
    resources:
    - name: workers-workerId-payslips
      path: /workers/{workerId}/payslips
      operations:
      - name: listworkerpayslips
        method: GET
        description: Workday Payroll List Worker Payslips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDate
          in: query
          type: string
          description: Filter payslips from this date
        - name: toDate
          in: query
          type: string
          description: Filter payslips up to this date
    - name: workers-workerId-payslips-payslipId
      path: /workers/{workerId}/payslips/{payslipId}
      operations:
      - name: getworkerpayslip
        method: GET
        description: Workday Payroll Get a Worker Payslip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_PAYROLL_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-results-payslips-rest
    port: 8080
    description: REST adapter for Workday Payroll Results API — Payslips. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/workers/{workerid}/payslips
      name: workers-workerid-payslips
      description: REST surface for workers-workerId-payslips.
      operations:
      - method: GET
        name: listworkerpayslips
        description: Workday Payroll List Worker Payslips
        call: payroll-results-payslips.listworkerpayslips
        with:
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workers/{workerid}/payslips/{payslipid}
      name: workers-workerid-payslips-payslipid
      description: REST surface for workers-workerId-payslips-payslipId.
      operations:
      - method: GET
        name: getworkerpayslip
        description: Workday Payroll Get a Worker Payslip
        call: payroll-results-payslips.getworkerpayslip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payroll-results-payslips-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Payroll Results API — Payslips. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: workday-payroll-list-worker-payslips
      description: Workday Payroll List Worker Payslips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-results-payslips.listworkerpayslips
      with:
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-payroll-get-worker-payslip
      description: Workday Payroll Get a Worker Payslip
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-results-payslips.getworkerpayslip
      outputParameters:
      - type: object
        mapping: $.
