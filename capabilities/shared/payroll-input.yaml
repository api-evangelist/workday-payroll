naftiko: "1.0.0-alpha1"

info:
  label: "Workday Payroll Input API"
  description: >-
    API for submitting and managing payroll input data including one-time payments,
    payroll adjustments, supplemental earnings, input batches, and time off inputs.
  tags:
    - Workday
    - Payroll
    - Compensation
    - Input Processing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN

capability:
  consumes:
    - type: http
      namespace: payroll-input
      baseUri: https://api.workday.com/payroll-input/v1
      description: "API for submitting one-time payments, adjustments, supplemental earnings, and batch payroll inputs."
      authentication:
        type: bearer
        token: "{{WORKDAY_PAYROLL_TOKEN}}"
      resources:
        - name: one-time-payments
          path: /oneTimePayments
          description: "One-time payment requests"
          operations:
            - name: list-one-time-payments
              method: GET
              description: "Retrieve all one-time payment requests"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: workerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by worker"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-one-time-payment
              method: POST
              description: "Submit a new one-time payment request"
              body:
                type: json
                data:
                  workerId: "{{tools.workerId}}"
                  earningCode: "{{tools.earningCode}}"
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"
                  reason: "{{tools.reason}}"
                  effectiveDate: "{{tools.effectiveDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: one-time-payment-by-id
          path: /oneTimePayments/{paymentId}
          description: "Individual one-time payment"
          operations:
            - name: get-one-time-payment
              method: GET
              description: "Retrieve details of a specific one-time payment"
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                  description: "One-time payment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-one-time-payment
              method: DELETE
              description: "Delete a pending one-time payment"
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                  description: "One-time payment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: adjustments
          path: /adjustments
          description: "Payroll adjustments"
          operations:
            - name: list-payroll-adjustments
              method: GET
              description: "Retrieve all payroll adjustment records"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: workerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by worker"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-payroll-adjustment
              method: POST
              description: "Submit a payroll adjustment"
              body:
                type: json
                data:
                  workerId: "{{tools.workerId}}"
                  adjustmentType: "{{tools.adjustmentType}}"
                  amount: "{{tools.amount}}"
                  reason: "{{tools.reason}}"
                  effectiveDate: "{{tools.effectiveDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: supplemental-earnings
          path: /supplementalEarnings
          description: "Supplemental earnings submissions"
          operations:
            - name: list-supplemental-earnings
              method: GET
              description: "Retrieve all supplemental earning submissions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: workerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by worker"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-supplemental-earning
              method: POST
              description: "Submit a supplemental earning for a worker"
              body:
                type: json
                data:
                  workerId: "{{tools.workerId}}"
                  earningCode: "{{tools.earningCode}}"
                  type: "{{tools.type}}"
                  amount: "{{tools.amount}}"
                  effectiveDate: "{{tools.effectiveDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: input-batches
          path: /inputBatches
          description: "Batch payroll input submissions"
          operations:
            - name: list-input-batches
              method: GET
              description: "Retrieve all payroll input batch submissions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by batch status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-input-batch
              method: POST
              description: "Submit a batch of payroll input records"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  records: "{{tools.records}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-time-off-inputs
          path: /workers/{workerId}/timeOffInputs
          description: "Worker time off inputs"
          operations:
            - name: list-worker-time-off-inputs
              method: GET
              description: "Retrieve time off input records for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-worker-time-off-input
              method: POST
              description: "Submit a time off input for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              body:
                type: json
                data:
                  timeOffType: "{{tools.timeOffType}}"
                  startDate: "{{tools.startDate}}"
                  endDate: "{{tools.endDate}}"
                  hours: "{{tools.hours}}"
                  paid: "{{tools.paid}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: payroll-input-rest
      resources:
        - path: /v1/one-time-payments
          name: one-time-payments
          description: "One-time payment management"
          operations:
            - method: GET
              name: list-one-time-payments
              description: "List one-time payments"
              call: "payroll-input.list-one-time-payments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-one-time-payment
              description: "Create a one-time payment"
              call: "payroll-input.create-one-time-payment"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/adjustments
          name: adjustments
          description: "Payroll adjustments"
          operations:
            - method: GET
              name: list-adjustments
              description: "List payroll adjustments"
              call: "payroll-input.list-payroll-adjustments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-adjustment
              description: "Create a payroll adjustment"
              call: "payroll-input.create-payroll-adjustment"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/input-batches
          name: input-batches
          description: "Batch input management"
          operations:
            - method: GET
              name: list-input-batches
              description: "List input batches"
              call: "payroll-input.list-input-batches"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-input-batch
              description: "Submit an input batch"
              call: "payroll-input.create-input-batch"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: payroll-input-mcp
      transport: http
      tools:
        - name: list-one-time-payments
          description: "List one-time payment requests"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-input.list-one-time-payments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-one-time-payment
          description: "Submit a one-time payment request"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-input.create-one-time-payment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-one-time-payment
          description: "Delete a pending one-time payment"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "payroll-input.delete-one-time-payment"
          with:
            paymentId: "tools.paymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-payroll-adjustments
          description: "List payroll adjustment records"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-input.list-payroll-adjustments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-payroll-adjustment
          description: "Submit a payroll correction or retroactive adjustment"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-input.create-payroll-adjustment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-supplemental-earnings
          description: "List supplemental earning submissions"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-input.list-supplemental-earnings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-supplemental-earning
          description: "Submit a supplemental earning (bonus, commission, etc.)"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-input.create-supplemental-earning"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-input-batches
          description: "List payroll input batch submissions"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-input.list-input-batches"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-input-batch
          description: "Submit a batch of payroll input records"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-input.create-input-batch"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-time-off-inputs
          description: "List time off inputs for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-input.list-worker-time-off-inputs"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-worker-time-off-input
          description: "Submit a time off input for payroll processing"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-input.create-worker-time-off-input"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
