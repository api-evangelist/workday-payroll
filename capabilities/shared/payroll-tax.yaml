naftiko: "1.0.0-alpha1"

info:
  label: "Workday Payroll Tax API"
  description: >-
    API for managing payroll tax calculations, tax withholdings, W-4 elections,
    tax filing information, and tax jurisdiction data within the Workday platform.
  tags:
    - Workday
    - Payroll
    - Tax
    - Compliance
    - Withholdings
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN

capability:
  consumes:
    - type: http
      namespace: payroll-tax
      baseUri: https://api.workday.com/tax/v1
      description: "API for tax withholdings, elections, calculations, jurisdictions, and filing."
      authentication:
        type: bearer
        token: "{{WORKDAY_PAYROLL_TOKEN}}"
      resources:
        - name: worker-tax-withholdings
          path: /workers/{workerId}/taxWithholdings
          description: "Worker tax withholding configurations"
          operations:
            - name: list-worker-tax-withholdings
              method: GET
              description: "Retrieve all tax withholding configurations for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-tax-elections
          path: /workers/{workerId}/taxElections
          description: "Worker tax elections (W-4, state forms)"
          operations:
            - name: list-worker-tax-elections
              method: GET
              description: "Retrieve W-4 and state tax election forms for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-jurisdictions
          path: /taxJurisdictions
          description: "Tax jurisdiction information"
          operations:
            - name: list-tax-jurisdictions
              method: GET
              description: "Retrieve all supported tax jurisdictions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-tax-calculations
          path: /payRuns/{payRunId}/taxCalculations
          description: "Tax calculations for a pay run"
          operations:
            - name: get-pay-run-tax-calculations
              method: GET
              description: "Retrieve tax calculation results for a completed pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique pay run identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-filing
          path: /taxFilings
          description: "Tax filing data and compliance reports"
          operations:
            - name: list-tax-filings
              method: GET
              description: "Retrieve tax filing records and compliance data"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: taxYear
                  in: query
                  type: integer
                  required: false
                  description: "Filter by tax year"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: payroll-tax-rest
      resources:
        - path: /v1/workers/{workerId}/tax-withholdings
          name: worker-tax-withholdings
          description: "Worker tax withholdings"
          operations:
            - method: GET
              name: list-worker-tax-withholdings
              description: "List tax withholdings for a worker"
              call: "payroll-tax.list-worker-tax-withholdings"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/tax-elections
          name: worker-tax-elections
          description: "Worker tax elections"
          operations:
            - method: GET
              name: list-worker-tax-elections
              description: "List tax elections for a worker"
              call: "payroll-tax.list-worker-tax-elections"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tax-jurisdictions
          name: tax-jurisdictions
          description: "Tax jurisdictions"
          operations:
            - method: GET
              name: list-tax-jurisdictions
              description: "List supported tax jurisdictions"
              call: "payroll-tax.list-tax-jurisdictions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: payroll-tax-mcp
      transport: http
      tools:
        - name: list-worker-tax-withholdings
          description: "List tax withholding configurations for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-worker-tax-withholdings"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-tax-elections
          description: "List W-4 and state tax election forms for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-worker-tax-elections"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tax-jurisdictions
          description: "List all supported tax jurisdictions"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-tax-jurisdictions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pay-run-tax-calculations
          description: "Get tax calculation results for a completed pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-pay-run-tax-calculations"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tax-filings
          description: "List tax filing records and compliance data"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-tax-filings"
          outputParameters:
            - type: object
              mapping: "$."
