naftiko: "1.0.0-alpha1"

info:
  label: "Workday Payroll Tax API"
  description: >-
    API for managing payroll tax calculations, tax withholdings, W-4 elections,
    tax filing information, and tax jurisdiction data within the Workday platform.
  tags:
    - Workday
    - Payroll
    - Tax
    - Compliance
    - Withholdings
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN

capability:
  consumes:
    - type: http
      namespace: payroll-tax
      baseUri: https://api.workday.com/tax/v1
      description: "API for tax withholdings, elections, calculations, jurisdictions, and filing."
      authentication:
        type: bearer
        token: "{{WORKDAY_PAYROLL_TOKEN}}"
      resources:
        - name: worker-tax-withholdings
          path: /workers/{workerId}/taxWithholdings
          description: "Worker tax withholding configurations"
          operations:
            - name: list-worker-tax-withholdings
              method: GET
              description: "Retrieve all tax withholding configurations for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-tax-withholding-by-id
          path: /workers/{workerId}/taxWithholdings/{withholdingId}
          description: "Individual tax withholding"
          operations:
            - name: get-worker-tax-withholding
              method: GET
              description: "Retrieve a specific tax withholding configuration"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: withholdingId
                  in: path
                  type: string
                  required: true
                  description: "Tax withholding identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-worker-tax-withholding
              method: PATCH
              description: "Update a tax withholding configuration"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: withholdingId
                  in: path
                  type: string
                  required: true
                  description: "Tax withholding identifier"
              body:
                type: json
                data:
                  filingStatus: "{{tools.filingStatus}}"
                  allowances: "{{tools.allowances}}"
                  additionalWithholding: "{{tools.additionalWithholding}}"
                  exempt: "{{tools.exempt}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-tax-elections
          path: /workers/{workerId}/taxElections
          description: "Worker tax elections (W-4, state forms)"
          operations:
            - name: list-worker-tax-elections
              method: GET
              description: "Retrieve W-4 and state tax election forms for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-worker-tax-election
              method: POST
              description: "Submit a new tax election for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              body:
                type: json
                data:
                  formType: "{{tools.formType}}"
                  jurisdictionId: "{{tools.jurisdictionId}}"
                  filingStatus: "{{tools.filingStatus}}"
                  multipleJobs: "{{tools.multipleJobs}}"
                  dependentsAmount: "{{tools.dependentsAmount}}"
                  otherIncome: "{{tools.otherIncome}}"
                  deductions: "{{tools.deductions}}"
                  additionalWithholding: "{{tools.additionalWithholding}}"
                  effectiveDate: "{{tools.effectiveDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-tax-election-by-id
          path: /workers/{workerId}/taxElections/{electionId}
          description: "Individual tax election"
          operations:
            - name: get-worker-tax-election
              method: GET
              description: "Retrieve a specific tax election"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: electionId
                  in: path
                  type: string
                  required: true
                  description: "Tax election identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-jurisdictions
          path: /taxJurisdictions
          description: "Tax jurisdiction information"
          operations:
            - name: list-tax-jurisdictions
              method: GET
              description: "Retrieve all configured tax jurisdictions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: level
                  in: query
                  type: string
                  required: false
                  description: "Filter by jurisdiction level"
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by country code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-jurisdiction-by-id
          path: /taxJurisdictions/{jurisdictionId}
          description: "Individual tax jurisdiction"
          operations:
            - name: get-tax-jurisdiction
              method: GET
              description: "Retrieve a specific tax jurisdiction"
              inputParameters:
                - name: jurisdictionId
                  in: path
                  type: string
                  required: true
                  description: "Tax jurisdiction identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-filings
          path: /taxFilings
          description: "Tax filing data and compliance reports"
          operations:
            - name: list-tax-filings
              method: GET
              description: "Retrieve tax filing records and compliance data"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: taxYear
                  in: query
                  type: integer
                  required: false
                  description: "Filter by tax year"
                - name: filingType
                  in: query
                  type: string
                  required: false
                  description: "Filter by filing type"
                - name: jurisdiction
                  in: query
                  type: string
                  required: false
                  description: "Filter by jurisdiction identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tax-filing-by-id
          path: /taxFilings/{filingId}
          description: "Individual tax filing"
          operations:
            - name: get-tax-filing
              method: GET
              description: "Retrieve a specific tax filing record"
              inputParameters:
                - name: filingId
                  in: path
                  type: string
                  required: true
                  description: "Tax filing identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-tax-results
          path: /payRuns/{payRunId}/taxResults
          description: "Tax results for a pay run"
          operations:
            - name: list-pay-run-tax-results
              method: GET
              description: "Retrieve aggregated tax calculation results for a completed pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique pay run identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-tax-summary
          path: /workers/{workerId}/taxSummary
          description: "Worker year-to-date tax summary"
          operations:
            - name: get-worker-tax-summary
              method: GET
              description: "Retrieve a year-to-date tax summary for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: taxYear
                  in: query
                  type: integer
                  required: false
                  description: "Tax year (defaults to current year)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: payroll-tax-rest
      resources:
        - path: /v1/workers/{workerId}/tax-withholdings
          name: worker-tax-withholdings
          description: "Worker tax withholdings"
          operations:
            - method: GET
              name: list-worker-tax-withholdings
              description: "List tax withholdings for a worker"
              call: "payroll-tax.list-worker-tax-withholdings"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/tax-withholdings/{withholdingId}
          name: worker-tax-withholding-by-id
          description: "Individual tax withholding"
          operations:
            - method: GET
              name: get-worker-tax-withholding
              description: "Get a specific tax withholding"
              call: "payroll-tax.get-worker-tax-withholding"
              with:
                workerId: "rest.workerId"
                withholdingId: "rest.withholdingId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-worker-tax-withholding
              description: "Update a tax withholding configuration"
              call: "payroll-tax.update-worker-tax-withholding"
              with:
                workerId: "rest.workerId"
                withholdingId: "rest.withholdingId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/tax-elections
          name: worker-tax-elections
          description: "Worker tax elections"
          operations:
            - method: GET
              name: list-worker-tax-elections
              description: "List tax elections for a worker"
              call: "payroll-tax.list-worker-tax-elections"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-worker-tax-election
              description: "Submit a new tax election for a worker"
              call: "payroll-tax.create-worker-tax-election"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/tax-elections/{electionId}
          name: worker-tax-election-by-id
          description: "Individual tax election"
          operations:
            - method: GET
              name: get-worker-tax-election
              description: "Get a specific tax election"
              call: "payroll-tax.get-worker-tax-election"
              with:
                workerId: "rest.workerId"
                electionId: "rest.electionId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/tax-summary
          name: worker-tax-summary
          description: "Worker tax summary"
          operations:
            - method: GET
              name: get-worker-tax-summary
              description: "Get year-to-date tax summary for a worker"
              call: "payroll-tax.get-worker-tax-summary"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tax-jurisdictions
          name: tax-jurisdictions
          description: "Tax jurisdictions"
          operations:
            - method: GET
              name: list-tax-jurisdictions
              description: "List supported tax jurisdictions"
              call: "payroll-tax.list-tax-jurisdictions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tax-jurisdictions/{jurisdictionId}
          name: tax-jurisdiction-by-id
          description: "Individual tax jurisdiction"
          operations:
            - method: GET
              name: get-tax-jurisdiction
              description: "Get a specific tax jurisdiction"
              call: "payroll-tax.get-tax-jurisdiction"
              with:
                jurisdictionId: "rest.jurisdictionId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tax-filings
          name: tax-filings
          description: "Tax filings"
          operations:
            - method: GET
              name: list-tax-filings
              description: "List tax filings"
              call: "payroll-tax.list-tax-filings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tax-filings/{filingId}
          name: tax-filing-by-id
          description: "Individual tax filing"
          operations:
            - method: GET
              name: get-tax-filing
              description: "Get a specific tax filing"
              call: "payroll-tax.get-tax-filing"
              with:
                filingId: "rest.filingId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}/tax-results
          name: pay-run-tax-results
          description: "Tax results for a pay run"
          operations:
            - method: GET
              name: list-pay-run-tax-results
              description: "List tax calculation results for a pay run"
              call: "payroll-tax.list-pay-run-tax-results"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: payroll-tax-mcp
      transport: http
      tools:
        - name: list-worker-tax-withholdings
          description: "List tax withholding configurations for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-worker-tax-withholdings"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-tax-withholding
          description: "Get a specific tax withholding configuration"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-worker-tax-withholding"
          with:
            workerId: "tools.workerId"
            withholdingId: "tools.withholdingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-worker-tax-withholding
          description: "Update a tax withholding configuration"
          hints:
            readOnly: false
            idempotent: true
          call: "payroll-tax.update-worker-tax-withholding"
          with:
            workerId: "tools.workerId"
            withholdingId: "tools.withholdingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-tax-elections
          description: "List W-4 and state tax election forms for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-worker-tax-elections"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-worker-tax-election
          description: "Submit a new W-4 or state tax election for a worker"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll-tax.create-worker-tax-election"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-tax-election
          description: "Get a specific worker tax election"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-worker-tax-election"
          with:
            workerId: "tools.workerId"
            electionId: "tools.electionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tax-jurisdictions
          description: "List all supported tax jurisdictions"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-tax-jurisdictions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tax-jurisdiction
          description: "Get details of a specific tax jurisdiction"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-tax-jurisdiction"
          with:
            jurisdictionId: "tools.jurisdictionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tax-filings
          description: "List tax filing records and compliance data"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-tax-filings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tax-filing
          description: "Get details of a specific tax filing"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-tax-filing"
          with:
            filingId: "tools.filingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-run-tax-results
          description: "List tax calculation results for a completed pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.list-pay-run-tax-results"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-tax-summary
          description: "Get year-to-date tax summary for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-tax.get-worker-tax-summary"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
