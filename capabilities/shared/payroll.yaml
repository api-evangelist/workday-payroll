naftiko: "1.0.0-alpha1"

info:
  label: "Workday Payroll API"
  description: >-
    Core API for managing payroll processes within the Workday platform,
    including payroll calculations, employee pay data, deductions, earnings,
    payroll runs, and pay group configurations.
  tags:
    - Workday
    - Payroll
    - Compensation
    - Human Resources
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN

capability:
  consumes:
    - type: http
      namespace: payroll
      baseUri: https://api.workday.com/payroll/v1
      description: "Core API for managing payroll runs, pay groups, workers, earnings, and deductions."
      authentication:
        type: bearer
        token: "{{WORKDAY_PAYROLL_TOKEN}}"
      resources:
        - name: pay-runs
          path: /payRuns
          description: "Manage payroll processing runs"
          operations:
            - name: list-pay-runs
              method: GET
              description: "Retrieve a collection of payroll runs"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: payGroupId
                  in: query
                  type: string
                  required: false
                  description: "Filter by pay group identifier"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by pay run status"
                - name: fromDate
                  in: query
                  type: string
                  required: false
                  description: "Filter from date"
                - name: toDate
                  in: query
                  type: string
                  required: false
                  description: "Filter to date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pay-run
              method: POST
              description: "Initiate a new payroll run"
              body:
                type: json
                data:
                  payGroupId: "{{tools.payGroupId}}"
                  payPeriod: "{{tools.payPeriod}}"
                  runCategory: "{{tools.runCategory}}"
                  paymentDate: "{{tools.paymentDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-by-id
          path: /payRuns/{payRunId}
          description: "Manage a specific pay run"
          operations:
            - name: get-pay-run
              method: GET
              description: "Retrieve details of a specific payroll run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay run"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-pay-run
              method: PATCH
              description: "Update the status or properties of a pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay run"
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  paymentDate: "{{tools.paymentDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-calculate
          path: /payRuns/{payRunId}/calculate
          description: "Trigger payroll calculations"
          operations:
            - name: calculate-pay-run
              method: POST
              description: "Trigger payroll calculations for a specific pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay run"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-complete
          path: /payRuns/{payRunId}/complete
          description: "Complete a pay run"
          operations:
            - name: complete-pay-run
              method: POST
              description: "Mark a pay run as completed"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay run"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-groups
          path: /payGroups
          description: "Manage pay groups"
          operations:
            - name: list-pay-groups
              method: GET
              description: "Retrieve all configured pay groups"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-group-by-id
          path: /payGroups/{payGroupId}
          description: "Access a specific pay group"
          operations:
            - name: get-pay-group
              method: GET
              description: "Retrieve details of a specific pay group"
              inputParameters:
                - name: payGroupId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay group"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-group-workers
          path: /payGroups/{payGroupId}/workers
          description: "Workers in a pay group"
          operations:
            - name: list-pay-group-workers
              method: GET
              description: "Retrieve all workers assigned to a specific pay group"
              inputParameters:
                - name: payGroupId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier for the pay group"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-payroll-details
          path: /workers/{workerId}/payrollDetails
          description: "Worker payroll details"
          operations:
            - name: get-worker-payroll-details
              method: GET
              description: "Retrieve payroll-specific details for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-earnings
          path: /workers/{workerId}/earnings
          description: "Worker earnings"
          operations:
            - name: list-worker-earnings
              method: GET
              description: "Retrieve all earnings records for a specific worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-deductions
          path: /workers/{workerId}/deductions
          description: "Worker deductions"
          operations:
            - name: list-worker-deductions
              method: GET
              description: "Retrieve all deductions for a specific worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: earning-codes
          path: /earningCodes
          description: "Earning code configuration"
          operations:
            - name: list-earning-codes
              method: GET
              description: "Retrieve all configured earning codes"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deduction-codes
          path: /deductionCodes
          description: "Deduction code configuration"
          operations:
            - name: list-deduction-codes
              method: GET
              description: "Retrieve all configured deduction codes"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: payroll-rest
      resources:
        - path: /v1/pay-runs
          name: pay-runs
          description: "Payroll runs management"
          operations:
            - method: GET
              name: list-pay-runs
              description: "List all pay runs"
              call: "payroll.list-pay-runs"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-pay-run
              description: "Create a new pay run"
              call: "payroll.create-pay-run"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}
          name: pay-run-by-id
          description: "Individual pay run"
          operations:
            - method: GET
              name: get-pay-run
              description: "Get a specific pay run"
              call: "payroll.get-pay-run"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-pay-run
              description: "Update a pay run"
              call: "payroll.update-pay-run"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}/calculate
          name: pay-run-calculate
          description: "Trigger pay run calculation"
          operations:
            - method: POST
              name: calculate-pay-run
              description: "Trigger payroll calculations"
              call: "payroll.calculate-pay-run"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}/complete
          name: pay-run-complete
          description: "Complete a pay run"
          operations:
            - method: POST
              name: complete-pay-run
              description: "Mark a pay run as completed"
              call: "payroll.complete-pay-run"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-groups
          name: pay-groups
          description: "Pay groups"
          operations:
            - method: GET
              name: list-pay-groups
              description: "List all pay groups"
              call: "payroll.list-pay-groups"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-groups/{payGroupId}
          name: pay-group-by-id
          description: "Individual pay group"
          operations:
            - method: GET
              name: get-pay-group
              description: "Get a specific pay group"
              call: "payroll.get-pay-group"
              with:
                payGroupId: "rest.payGroupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-groups/{payGroupId}/workers
          name: pay-group-workers
          description: "Workers in a pay group"
          operations:
            - method: GET
              name: list-pay-group-workers
              description: "List workers in a pay group"
              call: "payroll.list-pay-group-workers"
              with:
                payGroupId: "rest.payGroupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/payroll-details
          name: worker-payroll-details
          description: "Worker payroll details"
          operations:
            - method: GET
              name: get-worker-payroll-details
              description: "Get worker payroll details"
              call: "payroll.get-worker-payroll-details"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/earnings
          name: worker-earnings
          description: "Worker earnings"
          operations:
            - method: GET
              name: list-worker-earnings
              description: "List worker earnings"
              call: "payroll.list-worker-earnings"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workers/{workerId}/deductions
          name: worker-deductions
          description: "Worker deductions"
          operations:
            - method: GET
              name: list-worker-deductions
              description: "List worker deductions"
              call: "payroll.list-worker-deductions"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/earning-codes
          name: earning-codes
          description: "Earning codes"
          operations:
            - method: GET
              name: list-earning-codes
              description: "List earning codes"
              call: "payroll.list-earning-codes"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/deduction-codes
          name: deduction-codes
          description: "Deduction codes"
          operations:
            - method: GET
              name: list-deduction-codes
              description: "List deduction codes"
              call: "payroll.list-deduction-codes"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: payroll-mcp
      transport: http
      tools:
        - name: list-pay-runs
          description: "List payroll runs with optional filters"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-pay-runs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pay-run
          description: "Get details of a specific pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.get-pay-run"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-pay-run
          description: "Create a new payroll run"
          hints:
            readOnly: false
            idempotent: false
          call: "payroll.create-pay-run"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-pay-run
          description: "Update the status or properties of a pay run"
          hints:
            readOnly: false
            idempotent: true
          call: "payroll.update-pay-run"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: calculate-pay-run
          description: "Trigger payroll calculations for a pay run"
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "payroll.calculate-pay-run"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: complete-pay-run
          description: "Mark a pay run as completed"
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "payroll.complete-pay-run"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-groups
          description: "List all configured pay groups"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-pay-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pay-group
          description: "Get details of a specific pay group"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.get-pay-group"
          with:
            payGroupId: "tools.payGroupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-group-workers
          description: "List workers assigned to a pay group"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-pay-group-workers"
          with:
            payGroupId: "tools.payGroupId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-payroll-details
          description: "Get payroll details for a specific worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.get-worker-payroll-details"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-earnings
          description: "List earnings records for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-worker-earnings"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-deductions
          description: "List deductions for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-worker-deductions"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-earning-codes
          description: "List all earning code configurations"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-earning-codes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deduction-codes
          description: "List all deduction code configurations"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll.list-deduction-codes"
          outputParameters:
            - type: object
              mapping: "$."
