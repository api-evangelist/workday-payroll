naftiko: "1.0.0-alpha1"

info:
  label: "Workday Payroll Results API"
  description: >-
    API for retrieving payroll calculation results, payment details, payslip
    data, and historical payroll information within the Workday platform.
  tags:
    - Workday
    - Payroll
    - Payslips
    - Payments
    - Reporting
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN

capability:
  consumes:
    - type: http
      namespace: payroll-results
      baseUri: https://api.workday.com/payroll-results/v1
      description: "API for payslips, payments, payment elections, and payroll summaries."
      authentication:
        type: bearer
        token: "{{WORKDAY_PAYROLL_TOKEN}}"
      resources:
        - name: worker-payslips
          path: /workers/{workerId}/payslips
          description: "Worker payslip data"
          operations:
            - name: list-worker-payslips
              method: GET
              description: "Retrieve all payslips for a specific worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: fromDate
                  in: query
                  type: string
                  required: false
                  description: "Filter from date"
                - name: toDate
                  in: query
                  type: string
                  required: false
                  description: "Filter to date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-payslip-by-id
          path: /workers/{workerId}/payslips/{payslipId}
          description: "Individual payslip"
          operations:
            - name: get-worker-payslip
              method: GET
              description: "Retrieve detailed payslip for a specific pay period"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
                - name: payslipId
                  in: path
                  type: string
                  required: true
                  description: "Unique payslip identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-results
          path: /payRuns/{payRunId}/results
          description: "Aggregated pay run results"
          operations:
            - name: get-pay-run-results
              method: GET
              description: "Retrieve aggregated results for a completed pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique pay run identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-worker-results
          path: /payRuns/{payRunId}/results/workers
          description: "Worker-level pay run results"
          operations:
            - name: list-pay-run-worker-results
              method: GET
              description: "Retrieve individual worker results for a completed pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique pay run identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pay-run-payments
          path: /payRuns/{payRunId}/payments
          description: "Payments generated by a pay run"
          operations:
            - name: list-pay-run-payments
              method: GET
              description: "Retrieve all payment transactions generated by a pay run"
              inputParameters:
                - name: payRunId
                  in: path
                  type: string
                  required: true
                  description: "Unique pay run identifier"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payment-by-id
          path: /payments/{paymentId}
          description: "Individual payment transaction"
          operations:
            - name: get-payment
              method: GET
              description: "Retrieve details of a specific payment transaction"
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                  description: "Unique payment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: worker-payment-elections
          path: /workers/{workerId}/paymentElections
          description: "Worker payment election details"
          operations:
            - name: list-worker-payment-elections
              method: GET
              description: "Retrieve payment election details for a worker"
              inputParameters:
                - name: workerId
                  in: path
                  type: string
                  required: true
                  description: "Unique worker identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: payroll-results-rest
      resources:
        - path: /v1/workers/{workerId}/payslips
          name: worker-payslips
          description: "Worker payslips"
          operations:
            - method: GET
              name: list-worker-payslips
              description: "List payslips for a worker"
              call: "payroll-results.list-worker-payslips"
              with:
                workerId: "rest.workerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}/results
          name: pay-run-results
          description: "Pay run results"
          operations:
            - method: GET
              name: get-pay-run-results
              description: "Get aggregated results for a pay run"
              call: "payroll-results.get-pay-run-results"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pay-runs/{payRunId}/payments
          name: pay-run-payments
          description: "Payments for a pay run"
          operations:
            - method: GET
              name: list-pay-run-payments
              description: "List payments for a pay run"
              call: "payroll-results.list-pay-run-payments"
              with:
                payRunId: "rest.payRunId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: payroll-results-mcp
      transport: http
      tools:
        - name: list-worker-payslips
          description: "List payslips for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.list-worker-payslips"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-worker-payslip
          description: "Get detailed payslip for a specific pay period"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.get-worker-payslip"
          with:
            workerId: "tools.workerId"
            payslipId: "tools.payslipId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pay-run-results
          description: "Get aggregated results for a completed pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.get-pay-run-results"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-run-worker-results
          description: "List worker-level results for a pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.list-pay-run-worker-results"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-run-payments
          description: "List all payment transactions for a pay run"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.list-pay-run-payments"
          with:
            payRunId: "tools.payRunId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-payment
          description: "Get details of a specific payment transaction"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.get-payment"
          with:
            paymentId: "tools.paymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-payment-elections
          description: "List payment elections for a worker"
          hints:
            readOnly: true
            idempotent: true
          call: "payroll-results.list-worker-payment-elections"
          with:
            workerId: "tools.workerId"
          outputParameters:
            - type: object
              mapping: "$."
