      name: payruns-payrunid-results
      description: REST surface for payRuns-payRunId-results.
      operations:
      - method: GET
        name: getpayrunresults
        description: Workday Payroll Get Pay Run Results
        call: payroll-results-payroll-summaries.getpayrunresults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payruns/{payrunid}/results/workers
      name: payruns-payrunid-results-workers
      description: REST surface for payRuns-payRunId-results-workers.
      operations:
      - method: GET
        name: listpayrunworkerresults
        description: Workday Payroll List Worker-level Results for a Pay Run
        call: payroll-results-payroll-summaries.listpayrunworkerresults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payruns/{payrunid}/results/workers/{workerid}
      name: payruns-payrunid-results-workers-workerid
      description: REST surface for payRuns-payRunId-results-workers-workerId.
      operations:
      - method: GET
        name: getpayrunworkerresult
        description: Workday Payroll Get a Worker Result for a Pay Run
        call: payroll-results-payroll-summaries.getpayrunworkerresult
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
