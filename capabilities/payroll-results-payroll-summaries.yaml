    port: 9090
    transport: http
    description: MCP adapter for Workday Payroll Results API — Payroll Summaries. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-payroll-get-pay-run
      description: Workday Payroll Get Pay Run Results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-results-payroll-summaries.getpayrunresults
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-payroll-list-worker-level
