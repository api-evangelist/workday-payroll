naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll Results API — Payroll Summaries
  description: 'Workday Payroll Results API — Payroll Summaries. 3 operations. Lead operation: Workday Payroll Get Pay Run
    Results. Self-contained Naftiko capability covering one Workday Payroll business surface.'
  tags:
  - Workday Payroll
  - Payroll Summaries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_API_KEY: WORKDAY_PAYROLL_API_KEY
capability:
