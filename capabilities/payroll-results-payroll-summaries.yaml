    namespace: payroll-results-payroll-summaries
    baseUri: https://api.workday.com/payroll-results/v1
    description: Workday Payroll Results API — Payroll Summaries business capability. Self-contained, no shared references.
    resources:
    - name: payRuns-payRunId-results
      path: /payRuns/{payRunId}/results
      operations:
      - name: getpayrunresults
        method: GET
        description: Workday Payroll Get Pay Run Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payRuns-payRunId-results-workers
      path: /payRuns/{payRunId}/results/workers
      operations:
      - name: listpayrunworkerresults
        method: GET
        description: Workday Payroll List Worker-level Results for a Pay Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payRuns-payRunId-results-workers-workerId
      path: /payRuns/{payRunId}/results/workers/{workerId}
      operations:
      - name: getpayrunworkerresult
        method: GET
        description: Workday Payroll Get a Worker Result for a Pay Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_PAYROLL_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-results-payroll-summaries-rest
    port: 8080
    description: REST adapter for Workday Payroll Results API — Payroll Summaries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
