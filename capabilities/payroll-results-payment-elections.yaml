naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll Results API — Payment Elections
  description: 'Workday Payroll Results API — Payment Elections. 1 operations. Lead operation: Workday Payroll List Worker
    Payment Elections. Self-contained Naftiko capability covering one Workday Payroll business surface.'
  tags:
  - Workday Payroll
  - Payment Elections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_API_KEY: WORKDAY_PAYROLL_API_KEY
capability:
  consumes:
  - type: http
    namespace: payroll-results-payment-elections
    baseUri: https://api.workday.com/payroll-results/v1
    description: Workday Payroll Results API — Payment Elections business capability. Self-contained, no shared references.
    resources:
    - name: workers-workerId-paymentElections
      path: /workers/{workerId}/paymentElections
      operations:
      - name: listworkerpaymentelections
        method: GET
        description: Workday Payroll List Worker Payment Elections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_PAYROLL_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-results-payment-elections-rest
    port: 8080
    description: REST adapter for Workday Payroll Results API — Payment Elections. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{workerid}/paymentelections
      name: workers-workerid-paymentelections
      description: REST surface for workers-workerId-paymentElections.
      operations:
      - method: GET
        name: listworkerpaymentelections
        description: Workday Payroll List Worker Payment Elections
        call: payroll-results-payment-elections.listworkerpaymentelections
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payroll-results-payment-elections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Payroll Results API — Payment Elections. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-payroll-list-worker-payment
      description: Workday Payroll List Worker Payment Elections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-results-payment-elections.listworkerpaymentelections
      outputParameters:
      - type: object
        mapping: $.
