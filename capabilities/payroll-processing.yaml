naftiko: 1.0.0-alpha2
info:
  label: Workday Payroll Processing
  description: Unified capability for end-to-end payroll processing workflows combining the Workday Payroll, Payroll Input,
    Payroll Results, and Tax APIs. Supports HR administrators and payroll specialists running payroll cycles, managing worker
    pay data, submitting adjustments, and reviewing payroll results and compliance data.
  tags:
  - Workday
  - Payroll
  - Compensation
  - Human Resources
  - Tax
  - Compliance
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WORKDAY_PAYROLL_TOKEN: WORKDAY_PAYROLL_TOKEN
capability:
  consumes:
  - type: http
    namespace: payroll
    baseUri: https://api.workday.com/payroll/v1
    description: Core API for managing payroll runs, pay groups, workers, earnings, and deductions.
    authentication:
      type: bearer
      token: '{{WORKDAY_PAYROLL_TOKEN}}'
    resources:
    - name: pay-runs
      path: /payRuns
      description: Manage payroll processing runs
      operations:
      - name: list-pay-runs
        method: GET
        description: Retrieve a collection of payroll runs
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: payGroupId
          in: query
          type: string
          required: false
          description: Filter by pay group identifier
        - name: status
          in: query
          type: string
          required: false
          description: Filter by pay run status
        - name: fromDate
          in: query
          type: string
          required: false
          description: Filter from date
        - name: toDate
          in: query
          type: string
          required: false
          description: Filter to date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-pay-run
        method: POST
        description: Initiate a new payroll run
        body:
          type: json
          data:
            payGroupId: '{{tools.payGroupId}}'
            payPeriod: '{{tools.payPeriod}}'
            runCategory: '{{tools.runCategory}}'
            paymentDate: '{{tools.paymentDate}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-by-id
      path: /payRuns/{payRunId}
      description: Manage a specific pay run
      operations:
      - name: get-pay-run
        method: GET
        description: Retrieve details of a specific payroll run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-pay-run
        method: PATCH
        description: Update the status or properties of a pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay run
        body:
          type: json
          data:
            status: '{{tools.status}}'
            paymentDate: '{{tools.paymentDate}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-calculate
      path: /payRuns/{payRunId}/calculate
      description: Trigger payroll calculations
      operations:
      - name: calculate-pay-run
        method: POST
        description: Trigger payroll calculations for a specific pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-complete
      path: /payRuns/{payRunId}/complete
      description: Complete a pay run
      operations:
      - name: complete-pay-run
        method: POST
        description: Mark a pay run as completed
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-groups
      path: /payGroups
      description: Manage pay groups
      operations:
      - name: list-pay-groups
        method: GET
        description: Retrieve all configured pay groups
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-group-by-id
      path: /payGroups/{payGroupId}
      description: Access a specific pay group
      operations:
      - name: get-pay-group
        method: GET
        description: Retrieve details of a specific pay group
        inputParameters:
        - name: payGroupId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-group-workers
      path: /payGroups/{payGroupId}/workers
      description: Workers in a pay group
      operations:
      - name: list-pay-group-workers
        method: GET
        description: Retrieve all workers assigned to a specific pay group
        inputParameters:
        - name: payGroupId
          in: path
          type: string
          required: true
          description: Unique identifier for the pay group
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-payroll-details
      path: /workers/{workerId}/payrollDetails
      description: Worker payroll details
      operations:
      - name: get-worker-payroll-details
        method: GET
        description: Retrieve payroll-specific details for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-earnings
      path: /workers/{workerId}/earnings
      description: Worker earnings
      operations:
      - name: list-worker-earnings
        method: GET
        description: Retrieve all earnings records for a specific worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-deductions
      path: /workers/{workerId}/deductions
      description: Worker deductions
      operations:
      - name: list-worker-deductions
        method: GET
        description: Retrieve all deductions for a specific worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: earning-codes
      path: /earningCodes
      description: Earning code configuration
      operations:
      - name: list-earning-codes
        method: GET
        description: Retrieve all configured earning codes
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deduction-codes
      path: /deductionCodes
      description: Deduction code configuration
      operations:
      - name: list-deduction-codes
        method: GET
        description: Retrieve all configured deduction codes
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: payroll-results
    baseUri: https://api.workday.com/payroll-results/v1
    description: API for payslips, payments, payment elections, and payroll summaries.
    authentication:
      type: bearer
      token: '{{WORKDAY_PAYROLL_TOKEN}}'
    resources:
    - name: worker-payslips
      path: /workers/{workerId}/payslips
      description: Worker payslip data
      operations:
      - name: list-worker-payslips
        method: GET
        description: Retrieve all payslips for a specific worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: fromDate
          in: query
          type: string
          required: false
          description: Filter from date
        - name: toDate
          in: query
          type: string
          required: false
          description: Filter to date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-payslip-by-id
      path: /workers/{workerId}/payslips/{payslipId}
      description: Individual payslip
      operations:
      - name: get-worker-payslip
        method: GET
        description: Retrieve detailed payslip for a specific pay period
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: payslipId
          in: path
          type: string
          required: true
          description: Unique payslip identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-results
      path: /payRuns/{payRunId}/results
      description: Aggregated pay run results
      operations:
      - name: get-pay-run-results
        method: GET
        description: Retrieve aggregated results for a completed pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique pay run identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-worker-results
      path: /payRuns/{payRunId}/results/workers
      description: Worker-level pay run results
      operations:
      - name: list-pay-run-worker-results
        method: GET
        description: Retrieve individual worker results for a completed pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique pay run identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-worker-result-by-id
      path: /payRuns/{payRunId}/results/workers/{workerId}
      description: Individual worker result for a pay run
      operations:
      - name: get-pay-run-worker-result
        method: GET
        description: Retrieve detailed worker results within a completed pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique pay run identifier
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pay-run-payments
      path: /payRuns/{payRunId}/payments
      description: Payments generated by a pay run
      operations:
      - name: list-pay-run-payments
        method: GET
        description: Retrieve all payment transactions generated by a pay run
        inputParameters:
        - name: payRunId
          in: path
          type: string
          required: true
          description: Unique pay run identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-by-id
      path: /payments/{paymentId}
      description: Individual payment transaction
      operations:
      - name: get-payment
        method: GET
        description: Retrieve details of a specific payment transaction
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
          description: Unique payment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-payment-elections
      path: /workers/{workerId}/paymentElections
      description: Worker payment election details
      operations:
      - name: list-worker-payment-elections
        method: GET
        description: Retrieve payment election details for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: payroll-input
    baseUri: https://api.workday.com/payroll-input/v1
    description: API for submitting one-time payments, adjustments, supplemental earnings, and batch payroll inputs.
    authentication:
      type: bearer
      token: '{{WORKDAY_PAYROLL_TOKEN}}'
    resources:
    - name: one-time-payments
      path: /oneTimePayments
      description: One-time payment requests
      operations:
      - name: list-one-time-payments
        method: GET
        description: Retrieve all one-time payment requests
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: workerId
          in: query
          type: string
          required: false
          description: Filter by worker
        - name: status
          in: query
          type: string
          required: false
          description: Filter by status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-one-time-payment
        method: POST
        description: Submit a new one-time payment request
        body:
          type: json
          data:
            workerId: '{{tools.workerId}}'
            earningCode: '{{tools.earningCode}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            reason: '{{tools.reason}}'
            effectiveDate: '{{tools.effectiveDate}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: one-time-payment-by-id
      path: /oneTimePayments/{paymentId}
      description: Individual one-time payment
      operations:
      - name: get-one-time-payment
        method: GET
        description: Retrieve details of a specific one-time payment
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
          description: One-time payment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-one-time-payment
        method: PATCH
        description: Update a pending one-time payment request
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
          description: One-time payment identifier
        body:
          type: json
          data:
            amount: '{{tools.amount}}'
            reason: '{{tools.reason}}'
            effectiveDate: '{{tools.effectiveDate}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-one-time-payment
        method: DELETE
        description: Delete a pending one-time payment
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
          description: One-time payment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: adjustments
      path: /adjustments
      description: Payroll adjustments
      operations:
      - name: list-payroll-adjustments
        method: GET
        description: Retrieve all payroll adjustment records
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: workerId
          in: query
          type: string
          required: false
          description: Filter by worker
        - name: adjustmentType
          in: query
          type: string
          required: false
          description: Filter by adjustment type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payroll-adjustment
        method: POST
        description: Submit a payroll adjustment
        body:
          type: json
          data:
            workerId: '{{tools.workerId}}'
            adjustmentType: '{{tools.adjustmentType}}'
            originalPayRunId: '{{tools.originalPayRunId}}'
            earningCode: '{{tools.earningCode}}'
            deductionCode: '{{tools.deductionCode}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            reason: '{{tools.reason}}'
            effectiveDate: '{{tools.effectiveDate}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: adjustment-by-id
      path: /adjustments/{adjustmentId}
      description: Individual payroll adjustment
      operations:
      - name: get-payroll-adjustment
        method: GET
        description: Retrieve details of a specific payroll adjustment
        inputParameters:
        - name: adjustmentId
          in: path
          type: string
          required: true
          description: Payroll adjustment identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: supplemental-earnings
      path: /supplementalEarnings
      description: Supplemental earnings submissions
      operations:
      - name: list-supplemental-earnings
        method: GET
        description: Retrieve all supplemental earning submissions
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: workerId
          in: query
          type: string
          required: false
          description: Filter by worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-supplemental-earning
        method: POST
        description: Submit a supplemental earning for a worker
        body:
          type: json
          data:
            workerId: '{{tools.workerId}}'
            earningCode: '{{tools.earningCode}}'
            type: '{{tools.type}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            effectiveDate: '{{tools.effectiveDate}}'
            reason: '{{tools.reason}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: supplemental-earning-by-id
      path: /supplementalEarnings/{earningId}
      description: Individual supplemental earning
      operations:
      - name: get-supplemental-earning
        method: GET
        description: Retrieve details of a specific supplemental earning
        inputParameters:
        - name: earningId
          in: path
          type: string
          required: true
          description: Supplemental earning identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-supplemental-earning
        method: DELETE
        description: Delete a pending supplemental earning
        inputParameters:
        - name: earningId
          in: path
          type: string
          required: true
          description: Supplemental earning identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: input-batches
      path: /inputBatches
      description: Batch payroll input submissions
      operations:
      - name: list-input-batches
        method: GET
        description: Retrieve all payroll input batch submissions
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: status
          in: query
          type: string
          required: false
          description: Filter by batch status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-input-batch
        method: POST
        description: Submit a batch of payroll input records
        body:
          type: json
          data:
            name: '{{tools.name}}'
            records: '{{tools.records}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: input-batch-by-id
      path: /inputBatches/{batchId}
      description: Individual input batch
      operations:
      - name: get-input-batch
        method: GET
        description: Retrieve details of a specific input batch
        inputParameters:
        - name: batchId
          in: path
          type: string
          required: true
          description: Input batch identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-time-off-inputs
      path: /workers/{workerId}/timeOffInputs
      description: Worker time off inputs
      operations:
      - name: list-worker-time-off-inputs
        method: GET
        description: Retrieve time off input records for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-worker-time-off-input
        method: POST
        description: Submit a time off input for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        body:
          type: json
          data:
            timeOffType: '{{tools.timeOffType}}'
            startDate: '{{tools.startDate}}'
            endDate: '{{tools.endDate}}'
            hours: '{{tools.hours}}'
            paid: '{{tools.paid}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: payroll-tax
    baseUri: https://api.workday.com/tax/v1
    description: API for tax withholdings, elections, calculations, jurisdictions, and filing.
    authentication:
      type: bearer
      token: '{{WORKDAY_PAYROLL_TOKEN}}'
    resources:
    - name: worker-tax-withholdings
      path: /workers/{workerId}/taxWithholdings
      description: Worker tax withholding configurations
      operations:
      - name: list-worker-tax-withholdings
        method: GET
        description: Retrieve all tax withholding configurations for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-tax-withholding-by-id
      path: /workers/{workerId}/taxWithholdings/{withholdingId}
      description: Individual tax withholding
      operations:
      - name: get-worker-tax-withholding
        method: GET
        description: Retrieve a specific tax withholding configuration
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: withholdingId
          in: path
          type: string
          required: true
          description: Tax withholding identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-worker-tax-withholding
        method: PATCH
        description: Update a tax withholding configuration
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        - name: withholdingId
          in: path
          type: string
          required: true
          description: Tax withholding identifier
        body:
          type: json
          data:
            filingStatus: '{{tools.filingStatus}}'
            allowances: '{{tools.allowances}}'
            additionalWithholding: '{{tools.additionalWithholding}}'
            exempt: '{{tools.exempt}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: worker-tax-elections
      path: /workers/{workerId}/taxElections
      description: Worker tax elections (W-4, state forms)
      operations:
      - name: list-worker-tax-elections
        method: GET
        description: Retrieve W-4 and state tax election forms for a worker
        inputParameters:
        - name: workerId
          in: path
          type: string
          required: true
          description: Unique worker identifier
        outputRawFormat: json
        outputParameters:
        - name: result
